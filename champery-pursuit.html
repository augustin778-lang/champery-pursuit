function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function Confetti({active}){
  const ref=useRef(null),anim=useRef(null);
  useEffect(()=>{
    if(!active||!ref.current)return;
    const cv=ref.current,ctx=cv.getContext("2d");cv.width=window.innerWidth;cv.height=window.innerHeight;
    const cols=["#3b82f6","#f59e0b","#10b981","#ef4444","#8b5cf6","#ec4899","#fff"];
    const pts=Array.from({length:80},()=>({x:Math.random()*cv.width,y:Math.random()*-cv.height,w:4+Math.random()*8,h:2+Math.random()*5,c:cols[~~(Math.random()*cols.length)],vy:1.5+Math.random()*3,vx:(Math.random()-0.5)*2,r:Math.random()*360,vr:(Math.random()-0.5)*10}));
    const draw=()=>{ctx.clearRect(0,0,cv.width,cv.height);for(const p of pts){p.y+=p.vy;p.x+=p.vx;p.r+=p.vr;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();if(p.y>cv.height+30){p.y=-20;p.x=Math.random()*cv.width;}}anim.current=requestAnimationFrame(draw);};
    draw();return()=>cancelAnimationFrame(anim.current);
  },[active]);
  if(!active)return null;
  return <canvas ref={ref} style={{position:"fixed",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:999}}/>;
}

/* ═══ BOARD LAYOUT ═══ 
   30 outer ring cells (indices 0-29), 6 HQ cells (30-35), 1 hub (36)
   Each spoke: 5 ring cells + 1 HQ. Ring cells at indices 0,5,10,15,20,25 are "spoke junctions"
   that connect to HQ cells 30-35. Categories cycle around the ring.
*/
const BOARD_CATS=["Geography","Science","History","Entertainment","Sports","Art & Culture"];
const BOARD_CELLS=[];
// Outer ring: 30 cells
for(let i=0;i<30;i++) BOARD_CELLS.push({id:i,type:"ring",cat:BOARD_CATS[i%6]});
// HQ cells: 6 (one per category spoke)
for(let i=0;i<6;i++) BOARD_CELLS.push({id:30+i,type:"hq",cat:BOARD_CATS[i]});
// Hub center
BOARD_CELLS.push({id:36,type:"hub",cat:null});

// Adjacency: ring is circular, spoke junctions connect to HQ, HQ connects to hub
function getRingNeighbors(id){return[(id+1)%30,(id-1+30)%30];}
function getReachable(pos,steps){
  // BFS to find all cells exactly `steps` away
  let frontier=new Set([pos]),visited=new Set([pos]);
  for(let s=0;s<steps;s++){
    const next=new Set();
    for(const p of frontier){
      let neighbors=[];
      if(p<30){
        neighbors=getRingNeighbors(p);
        // Spoke junction? Can go to HQ
        const spokeIdx=p%5===0?p/5:-1;
        if(spokeIdx>=0&&spokeIdx<6)neighbors.push(30+spokeIdx);
      } else if(p>=30&&p<36){
        // HQ: can go back to ring junction or to hub
        const spokeIdx=p-30;
        neighbors=[spokeIdx*5,36];
      } else if(p===36){
        // Hub: can go to any HQ
        neighbors=[30,31,32,33,34,35];
      }
      for(const n of neighbors){if(!visited.has(n)){next.add(n);visited.add(n);}}
    }
    frontier=next;
  }
  return[...frontier];
}

// Board cell positions for SVG rendering
function getCellPos(id){
  const cx=160,cy=160,ringR=120,hqR=60;
  if(id<30){
    const angle=(id*12-90)*Math.PI/180;
    return{x:cx+ringR*Math.cos(angle),y:cy+ringR*Math.sin(angle)};
  } else if(id<36){
    const spoke=id-30,angle=(spoke*60-90)*Math.PI/180;
    return{x:cx+hqR*Math.cos(angle),y:cy+hqR*Math.sin(angle)};
  }
  return{x:cx,y:cy};
}

function GameBoard({pos,wedges,reachable,onCellClick,team}){
  const sz=320;
  return(<svg width="100%" viewBox="0 0 320 320" style={{maxWidth:sz}}>
    {/* Spoke lines from junctions to HQ */}
    {[0,1,2,3,4,5].map(i=>{
      const junc=getCellPos(i*5),hq=getCellPos(30+i);
      return <line key={`spoke${i}`} x1={junc.x} y1={junc.y} x2={hq.x} y2={hq.y} stroke="rgba(255,255,255,0.06)" strokeWidth={1.5}/>;
    })}
    {/* Lines from HQ to hub */}
    {[0,1,2,3,4,5].map(i=>{
      const hq=getCellPos(30+i),hub=getCellPos(36);
      return <line key={`hub${i}`} x1={hq.x} y1={hq.y} x2={hub.x} y2={hub.y} stroke="rgba(255,255,255,0.04)" strokeWidth={1} strokeDasharray="3,3"/>;
    })}
    {/* Ring arcs (connect adjacent ring cells) */}
    {Array.from({length:30}).map((_,i)=>{
      const a=getCellPos(i),b=getCellPos((i+1)%30);
      return <line key={`arc${i}`} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="rgba(255,255,255,0.05)" strokeWidth={1}/>;
    })}
    {/* Cells */}
    {BOARD_CELLS.map(cell=>{
      const p=getCellPos(cell.id);
      const isReachable=reachable.includes(cell.id);
      const isPos=pos===cell.id;
      const cat=cell.cat;const cm=cat?CAT_META[cat]:null;
      const hasWedge=cat&&wedges.includes(cat);
      const isHub=cell.type==="hub";const isHq=cell.type==="hq";
      const r=isHub?16:isHq?13:isPos?10:isReachable?9:7;
      const fill=isPos?TC[team]:isReachable?(cm?cm.color+"cc":"rgba(255,255,255,0.3)"):isHub?(wedges.length>=6?"#f59e0b":"rgba(255,255,255,0.04)"):isHq?(hasWedge?cm.color+"44":"rgba(255,255,255,0.06)"):(cm?cm.color+"18":"rgba(255,255,255,0.04)");
      const stroke=isReachable?"#fff":isPos?"#fff":isHq?(hasWedge?cm.color+"88":"rgba(255,255,255,0.1)"):"rgba(255,255,255,0.06)";
      const sw=isReachable?2.5:isPos?2:1;
      return <g key={cell.id} onClick={()=>isReachable&&onCellClick(cell)} style={{cursor:isReachable?"pointer":"default"}}>
        <circle cx={p.x} cy={p.y} r={r} fill={fill} stroke={stroke} strokeWidth={sw} style={{transition:"all 0.3s"}}/>
        {isReachable&&<circle cx={p.x} cy={p.y} r={r+3} fill="none" stroke="#fff" strokeWidth={0.5} opacity={0.4} style={{animation:"pulse 1.5s ease infinite"}}/>}
        {(isHq||isHub)&&<text x={p.x} y={p.y} textAnchor="middle" dominantBaseline="central" fontSize={isHub?11:10} fill="#fff">{isHub?"⭐":(cm?cm.icon:"")}</text>}
        {isPos&&<text x={p.x} y={p.y} textAnchor="middle" dominantBaseline="central" fontSize={7} fill="#fff">●</text>}
      </g>;
    })}
    {/* Legend */}
    <text x={160} y={308} textAnchor="middle" fontSize={8} fill="rgba(255,255,255,0.2)">Click a glowing cell to move</text>
  </svg>);
}

function MiniBoard({wedges,cur}){
  return(<svg width={110} height={110} viewBox="0 0 110 110">
    {CATS.slice(0,6).map((cat,i)=>{const a=(i*60-90)*Math.PI/180,x=55+34*Math.cos(a),y=55+34*Math.sin(a),has=wedges.includes(cat),act=cur===cat;
    return <g key={cat}><circle cx={x} cy={y} r={act?15:11} fill={has?CAT_META[cat].color:"rgba(255,255,255,0.06)"} stroke={act?"#fff":"rgba(255,255,255,0.12)"} strokeWidth={act?2:1}/><text x={x} y={y} textAnchor="middle" dominantBaseline="central" fontSize={act?13:9}>{CAT_META[cat].icon}</text></g>;})}
    <circle cx={55} cy={55} r={13} fill={wedges.length>=6?"#f59e0b":"rgba(255,255,255,0.04)"} stroke="rgba(255,255,255,0.15)" strokeWidth={1}/><text x={55} y={55} textAnchor="middle" dominantBaseline="central" fontSize={9} fill="#fff">{wedges.length}/6</text>
  </svg>);
}

function applyFilter(questions,filterText,diffLevel){
  let pool=[...questions];
  if(diffLevel<=1)pool=pool.filter(q=>q.d==="easy");
  else if(diffLevel===2)pool=pool.filter(q=>q.d==="easy"||q.d==="medium");
  else if(diffLevel===3)pool=pool;
  else if(diffLevel===4)pool=pool.filter(q=>q.d==="medium"||q.d==="hard");
  else pool=pool.filter(q=>q.d==="hard");
  if(!filterText||!filterText.trim())return pool;
  const f=filterText.toLowerCase();
  const excl=[{r:/no\s*(tv|television|pop\s*culture|entertainment)/i,c:["Entertainment"]},{r:/no\s*sports?/i,c:["Sports"]},{r:/no\s*science/i,c:["Science"]},{r:/no\s*history/i,c:["History"]},{r:/no\s*geograph/i,c:["Geography"]},{r:/no\s*(art|culture)/i,c:["Art & Culture"]},{r:/no\s*food/i,c:["Food & Drink"]},{r:/no\s*tech/i,c:["Technology"]},{r:/no\s*natur/i,c:["Nature"]},{r:/no\s*(liter|book)/i,c:["Literature"]}];
  let ec=new Set();for(const p of excl){if(p.r.test(filterText))p.c.forEach(c=>ec.add(c));}
  const om=filterText.match(/only\s+([\w\s,&]+)/i);
  if(om){const ot=om[1].toLowerCase();const ic=CATS.filter(c=>ot.includes(c.toLowerCase().split(" ")[0]));if(ic.length>0)pool=pool.filter(q=>ic.includes(q.c));}
  if(ec.size>0)pool=pool.filter(q=>!ec.has(q.c));
  const na=filterText.match(/no\s+(?:questions?\s+(?:about|on|related\s+to)\s+)([\w\s,]+)/i);
  if(na){const kw=na[1].toLowerCase().split(/[,\s]+/).filter(Boolean);pool=pool.filter(q=>!kw.some(k=>q.q.toLowerCase().includes(k)||q.a.toLowerCase().includes(k)));}
  const fm=filterText.match(/(?:focus\s+on|about|related\s+to)\s+([\w\s,]+)/i);
  if(fm&&!na){const kw=fm[1].toLowerCase().split(/[,\s]+/).filter(Boolean);const fo=pool.filter(q=>kw.some(k=>q.q.toLowerCase().includes(k)||q.a.toLowerCase().includes(k)||q.c.toLowerCase().includes(k)));if(fo.length>=10)pool=fo;}
  return pool;
}

function App(){
  const [phase,setPhase]=useState("home");
  const [mode,setMode]=useState(null);
  const [diff,setDiff]=useState(3);
  const [filter,setFilter]=useState("");
  const [nQ,setNQ]=useState(10);
  const [pool,setPool]=useState([]);
  const [team,setTeam]=useState(0);
  const [scores,setScores]=useState([0,0]);
  const [curQ,setCurQ]=useState(null);
  const [revealed,setRevealed]=useState(false);
  const [ca,setCa]=useState("");
  const [flash,setFlash]=useState(null);
  const [jokers,setJokers]=useState([true,true]);
  const [mcMode,setMcMode]=useState(false);
  const [timer,setTimer]=useState(TIMER_SEC);
  const [timerOn,setTimerOn]=useState(false);
  const [timeUp,setTimeUp]=useState(false);
  const [asked,setAsked]=useState([0,0]);
  const [wedges,setWedges]=useState([[],[]]);
  const [isHQ,setIsHQ]=useState(false);
  const [curCat,setCurCat]=useState(null);
  const [diceVal,setDiceVal]=useState(null);
  const [picking,setPicking]=useState(false);
  const [hubPick,setHubPick]=useState(false);
  const [hubQ,setHubQ]=useState(false);
  const [streak,setStreak]=useState(0);
  const [boardPos,setBoardPos]=useState([0,15]); // each team starts opposite
  const [reachable,setReachable]=useState([]);
  const [mult,setMult]=useState(1);
  const [bonus,setBonus]=useState(false);
  const [sdOn,setSdOn]=useState(false);
  const [sdTurn,setSdTurn]=useState(0);
  const [sdSc,setSdSc]=useState([0,0]);
  const [sdR,setSdR]=useState(0);
  const [usedIds,setUsedIds]=useState(new Set());
  const poolRef=useRef([]);
  const [answerInput,setAnswerInput]=useState("");
  const [answerResult,setAnswerResult]=useState(null); // null|"correct"|"wrong"
  const answerRef=useRef(null);
  const [mcOptions,setMcOptions]=useState([]);
  const [autoSpeak,setAutoSpeak]=useState(true);

  const speak=(text)=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="en-US";u.rate=0.95;u.pitch=1;
    // Pick best English voice
    const voices=window.speechSynthesis.getVoices();
    const en=voices.filter(v=>v.lang.startsWith("en"));
    if(en.length>0)u.voice=en[0];
    window.speechSynthesis.speak(u);
  };

  // Fuzzy match: normalize + Levenshtein distance
  const normalize=(s)=>s.toLowerCase().replace(/[^a-z0-9àáâãäåèéêëìíîïòóôõöùúûüýÿñç]/g,"");
  const levenshtein=(a,b)=>{
    const m=a.length,n=b.length,d=Array.from({length:m+1},(_,i)=>Array(n+1).fill(0));
    for(let i=0;i<=m;i++)d[i][0]=i;for(let j=0;j<=n;j++)d[0][j]=j;
    for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]!==b[j-1]?1:0));
    return d[m][n];
  };
  const fuzzyMatch=(input,answer)=>{
    const ni=normalize(input),na=normalize(answer);
    if(!ni)return false;
    if(na.includes(ni)||ni.includes(na))return true;
    // Also check individual parts of the answer (e.g. "Canberra" in "Canberra, Australia")
    const parts=answer.split(/[\s,()\/\-]+/).map(normalize).filter(p=>p.length>2);
    for(const p of parts){if(p===ni)return true;if(levenshtein(ni,p)<=Math.max(1,Math.floor(p.length*0.25)))return true;}
    // Full answer comparison with tolerance
    const dist=levenshtein(ni,na);
    const threshold=Math.max(2,Math.floor(na.length*0.25));
    return dist<=threshold;
  };

  const tRef=useRef(null);
  useEffect(()=>{if(!timerOn){clearInterval(tRef.current);return;}tRef.current=setInterval(()=>{setTimer(t=>{if(t<=1){clearInterval(tRef.current);setTimerOn(false);setTimeUp(true);return 0;}return t-1;});},1000);return()=>clearInterval(tRef.current);},[timerOn]);

  const startT=()=>{setTimer(TIMER_SEC);setTimerOn(true);setTimeUp(false);};
  const stopT=()=>setTimerOn(false);
  const cl=(a,b)=>`clamp(${a}px,${a+(b-a)*0.5}px + 1vw,${b}px)`;

  const pickQ=(cat)=>{
    const p=poolRef.current;
    if(!p||p.length===0)return;
    const avail=p.filter(q=>(!cat||q.c===cat)&&!usedIds.has(q.q));
    let q;
    if(avail.length===0){setUsedIds(new Set());q=pick(p.filter(qq=>!cat||qq.c===cat));}
    else q=pick(avail);
    if(!q)q=pick(p);
    if(!q)return;
    setUsedIds(s=>{const n=new Set(s);n.add(q.q);return n;});
    setCurQ(q);setRevealed(false);setMcMode(false);setTimeUp(false);setAnswerInput("");setAnswerResult(null);startT();setCa("in");setTimeout(()=>{setCa("");if(answerRef.current)answerRef.current.focus();if(autoSpeak)speak(q.q);},400);
  };

  const startGame=()=>{
    const f=shuffle(applyFilter(QUESTIONS,filter,diff));
    if(f.length<10){alert("Not enough questions with these filters.");return;}
    poolRef.current=f;setPool(f);
    setTeam(0);setScores([0,0]);setJokers([true,true]);
    setAsked([0,0]);setWedges([[],[]]);setStreak(0);setMult(1);setBonus(false);setBoardPos([0,15]);setReachable([]);
    setSdOn(false);setSdTurn(0);setSdSc([0,0]);setSdR(0);setUsedIds(new Set());
    setPicking(false);setHubPick(false);setHubQ(false);setDiceVal(null);setCurQ(null);
    setPhase("game");
    setTimeout(()=>{
      if(mode==="classic")classicStart();
      else if(mode==="hybrid")hybridStart();
      else pickQ(null);
    },150);
  };

  // SIMPLE
  const simpleAns=(ok)=>{stopT();
    if(ok){setScores(s=>{const n=[...s];n[team]++;return n;});setFlash(team);setTimeout(()=>setFlash(null),500);}
    const na=[...asked];na[team]++;setAsked(na);
    setCa("out");setTimeout(()=>{
      if(na[0]+na[1]>=nQ*2){const s0=scores[0]+(ok&&team===0?1:0),s1=scores[1]+(ok&&team===1?1:0);if(s0===s1){initSD();}else{setPhase("end");}}
      else{setTeam(1-team);pickQ(null);}
    },300);
  };

  // CLASSIC
  const classicStart=()=>{setDiceVal(null);setPicking(false);setIsHQ(false);setHubQ(false);setHubPick(false);setReachable([]);setCurQ(null);
    if(wedges[team]?.length>=6){
      // If at hub (36), go to final challenge. Otherwise roll to reach hub.
      if(boardPos[team]===36){setHubPick(true);return;}
      // Otherwise, normal roll - hub will appear as reachable if possible
    }
    let n=0;const iv=setInterval(()=>{setDiceVal(Math.floor(Math.random()*6)+1);n++;
      if(n>=8){clearInterval(iv);const v=Math.floor(Math.random()*6)+1;setDiceVal(v);
        const cells=getReachable(boardPos[team],v);
        // Filter: if team has all wedges, include hub; if not, exclude hub
        const filtered=cells.filter(c=>c!==36||wedges[team]?.length>=6);
        setReachable(filtered);setPicking(true);
      }
    },100);
  };

  const classicCellClick=(cell)=>{
    setPicking(false);setReachable([]);
    const np=[...boardPos];np[team]=cell.id;setBoardPos(np);
    const hq=cell.type==="hq";
    const hub=cell.type==="hub";
    setIsHQ(hq);setCurCat(cell.cat);
    if(hub){
      // Arrived at hub with all wedges -> final challenge
      setHubPick(true);
    } else {
      pickQ(cell.cat||pick(BOARD_CATS));
    }
  };

  const classicPick=(cat)=>{setPicking(false);setCurCat(cat);pickQ(cat);};

  const classicAns=(ok)=>{stopT();
    if(ok){
      if(isHQ&&!wedges[team].includes(curCat)){const nw=[...wedges];nw[team]=[...nw[team],curCat];setWedges(nw);}
      setScores(s=>{const n=[...s];n[team]++;return n;});setFlash(team);setTimeout(()=>setFlash(null),600);
      setStreak(s=>s+1);
      setCa("out");setTimeout(()=>{
        const uw=isHQ&&!wedges[team].includes(curCat)?[...wedges[team],curCat]:wedges[team];
        if(uw.length>=6){setHubPick(true);}else classicStart();
      },300);
    } else {setStreak(0);setCa("out");setTimeout(()=>{setTeam(1-team);setTimeout(()=>classicStart(),100);},300);}
  };

  const hubStart=(cat)=>{setHubPick(false);setHubQ(true);setCurCat(cat);pickQ(cat);};
  const hubAns=(ok)=>{stopT();if(ok){setScores(s=>{const n=[...s];n[team]+=5;return n;});setPhase("end");}
    else{setHubQ(false);setCa("out");setTimeout(()=>{setTeam(1-team);setTimeout(()=>classicStart(),100);},300);}};

  // HYBRID
  const hybridStart=()=>{setCurCat(null);setBonus(false);
    const tot=asked[0]+asked[1];setBonus(tot>0&&tot%5===0);
    const cat=pick(CATS);setCurCat(cat);pickQ(cat);
  };

  const hybridAns=(ok)=>{stopT();const na=[...asked];na[team]++;setAsked(na);
    if(ok){const pts=bonus?3:mult;setScores(s=>{const n=[...s];n[team]+=pts;return n;});setFlash(team);setTimeout(()=>setFlash(null),500);
      const ns=streak+1;setStreak(ns);if(ns>=3&&mult<3){setMult(m=>Math.min(m+1,3));setStreak(0);}
    } else {if(bonus)setScores(s=>{const n=[...s];n[team]=Math.max(0,n[team]-2);return n;});setMult(1);setStreak(0);}
    setCa("out");setTimeout(()=>{
      if(na[0]+na[1]>=nQ*2){setPhase("end");}
      else{setTeam(1-team);hybridStart();}
    },300);
  };

  // SUDDEN DEATH
  const initSD=()=>{setSdOn(true);setSdTurn(0);setSdSc([0,0]);setSdR(1);setTeam(0);pickQ(null);};
  const sdAns=(ok)=>{stopT();const ns=[...sdSc];if(ok)ns[sdTurn]++;setSdSc(ns);
    setCa("out");setTimeout(()=>{
      if(sdTurn===0){setSdTurn(1);setTeam(1);pickQ(null);}
      else{if(ns[0]!==ns[1]){setScores(s=>[s[0]+ns[0],s[1]+ns[1]]);setPhase("end");}
        else{setSdR(r=>r+1);setSdSc([0,0]);setSdTurn(0);setTeam(0);pickQ(null);}}
    },300);
  };

  const reveal=()=>{setRevealed(true);stopT();if(window.speechSynthesis)window.speechSynthesis.cancel();};
  const submitAnswer=()=>{
    if(!answerInput.trim())return;
    stopT();if(window.speechSynthesis)window.speechSynthesis.cancel();
    const isCorrect=fuzzyMatch(answerInput,curQ.a);
    setAnswerResult(isCorrect?"correct":"wrong");
    setRevealed(true);
  };
  const useJoker=()=>{if(!jokers[team]||!curQ)return;const n=[...jokers];n[team]=false;setJokers(n);setMcMode(true);setAnswerInput("");setAnswerResult(null);setMcOptions(shuffle(curQ.w));};
  const goHome=()=>{setPhase("home");stopT();if(window.speechSynthesis)window.speechSynthesis.cancel();};
  const extendGame=(x)=>{setNQ(n=>n+x);setPhase("game");if(mode==="simple")pickQ(null);else hybridStart();};

  const handleAns=sdOn?sdAns:mode==="simple"?simpleAns:mode==="classic"?(hubQ?hubAns:classicAns):hybridAns;

  const S={
    root:{minHeight:"100vh",background:"radial-gradient(ellipse at 20% 0%,#1a1040,#0b0b1a 50%,#0a0e1a)",fontFamily:"'Outfit',sans-serif",color:"#fff",display:"flex",flexDirection:"column",alignItems:"center",padding:"20px 16px"},
    glass:{background:"rgba(255,255,255,0.04)",backdropFilter:"blur(16px)",borderRadius:24,padding:"28px 24px",border:"1px solid rgba(255,255,255,0.07)"},
  };

  return(<>
    <style>{`@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap');
      *{box-sizing:border-box;margin:0;padding:0}body{background:#0b0b1a}
      @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
      @keyframes fadeOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-16px)}}
      @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
      @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

      .ci{animation:fadeUp .35s ease both}.co{animation:fadeOut .25s ease both}.sf{animation:pulse .4s ease}
      .fl{animation:float 3s ease-in-out infinite}.shake{animation:shake .4s ease}.gd{animation:gp 1s ease infinite}
      .bt{cursor:pointer;border:none;outline:none;font-family:'Outfit',sans-serif;transition:transform .15s}.bt:active{transform:scale(.97)}
      .mc{cursor:pointer;border:1px solid rgba(255,255,255,0.1);outline:none;font-family:'Outfit',sans-serif;background:rgba(255,255,255,0.04);border-radius:12px;padding:13px 16px;color:#fff;font-size:13px;font-weight:600;text-align:left;transition:all .2s;width:100%}.mc:hover{background:rgba(255,255,255,0.08)}
      .cb{cursor:pointer;border:1px solid rgba(255,255,255,0.08);outline:none;font-family:'Outfit',sans-serif;background:rgba(255,255,255,0.03);border-radius:14px;padding:12px 8px;color:#fff;font-size:12px;font-weight:600;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px}.cb:hover{background:rgba(255,255,255,0.08);transform:scale(1.03)}
      input,textarea{font-family:'Outfit',sans-serif}
    `}</style>
    <div style={S.root}>

    {/* ══ HOME ══ */}
    {phase==="home"&&(<div className="ci" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flex:1,textAlign:"center",maxWidth:520,width:"100%"}}>
      <div className="fl" style={{fontSize:52,marginBottom:6}}>🎲</div>
      <h1 style={{fontSize:cl(34,46),fontWeight:900,letterSpacing:6,lineHeight:1}}>CHAMPÉRY</h1>
      <h2 style={{fontSize:cl(18,24),fontWeight:300,color:"rgba(255,255,255,0.5)",letterSpacing:12,marginBottom:4}}>PURSUIT</h2>
      <div style={{width:50,height:2,background:"linear-gradient(90deg,#3b82f6,#f59e0b)",borderRadius:2,margin:"8px auto 4px"}}/>
      <p style={{fontSize:10,color:"rgba(255,255,255,0.25)",letterSpacing:3,textTransform:"uppercase",marginBottom:22}}>Édition Trentenaires · 250 Questions</p>

      {/* Mode */}
      <p style={{fontSize:11,color:"rgba(255,255,255,0.35)",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Game Mode</p>
      <div style={{display:"flex",gap:7,flexWrap:"wrap",justifyContent:"center",marginBottom:18,width:"100%"}}>
        {[{id:"simple",l:"🎯 Simple",d:"Alternating turns, high score wins"},{id:"classic",l:"🏆 Classic",d:"Wedges, HQ rolls, keep playing while correct"},{id:"hybrid",l:"⚡ Hybrid",d:"Streaks + multipliers + bonus rounds"}].map(m=>(
          <button key={m.id} className="bt" onClick={()=>setMode(m.id)} style={{flex:"1 1 140px",background:mode===m.id?"rgba(59,130,246,0.15)":"rgba(255,255,255,0.03)",border:mode===m.id?"1px solid rgba(59,130,246,0.4)":"1px solid rgba(255,255,255,0.06)",borderRadius:14,padding:"12px 10px",textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:3}}>{m.l}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",lineHeight:1.3}}>{m.d}</div>
          </button>))}
      </div>

      {/* Difficulty 1-5 */}
      <div style={{width:"100%",marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <p style={{fontSize:11,color:"rgba(255,255,255,0.35)",letterSpacing:2,textTransform:"uppercase"}}>Difficulty: {diff}/5</p>
          <p style={{fontSize:10,color:"rgba(255,255,255,0.2)"}}>{["","Casual","Easy","Balanced","Challenging","Expert"][diff]}</p>
        </div>
        <div style={{display:"flex",gap:5,justifyContent:"center"}}>
          {[1,2,3,4,5].map(n=>(<button key={n} className="bt" onClick={()=>setDiff(n)} style={{width:42,height:42,borderRadius:11,fontSize:15,fontWeight:800,background:n<=diff?`hsl(${120-n*24},70%,${55-n*5}%)`:"rgba(255,255,255,0.04)",color:n<=diff?"#fff":"rgba(255,255,255,0.2)",border:n===diff?"2px solid #fff":"1px solid rgba(255,255,255,0.06)"}}>{n}</button>))}
        </div>
      </div>

      {/* Questions count */}
      {mode!=="classic"&&(<div style={{width:"100%",marginBottom:16}}>
        <p style={{fontSize:11,color:"rgba(255,255,255,0.35)",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Questions per team</p>
        <div style={{display:"flex",gap:5,justifyContent:"center"}}>
          {[5,10,15,20].map(n=>(<button key={n} className="bt" onClick={()=>setNQ(n)} style={{padding:"7px 16px",borderRadius:10,fontSize:13,fontWeight:700,background:nQ===n?"rgba(59,130,246,0.2)":"rgba(255,255,255,0.04)",border:nQ===n?"1px solid rgba(59,130,246,0.4)":"1px solid rgba(255,255,255,0.06)",color:nQ===n?"#3b82f6":"rgba(255,255,255,0.3)"}}>{n}</button>))}
        </div>
      </div>)}

      {/* Filter */}
      <div style={{width:"100%",marginBottom:22}}>
        <p style={{fontSize:11,color:"rgba(255,255,255,0.35)",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>🎛 Question Filter <span style={{color:"rgba(255,255,255,0.15)"}}>(optional)</span></p>
        <textarea value={filter} onChange={e=>setFilter(e.target.value)} placeholder={'e.g. "No sports, no entertainment"\n"Only science and history"\n"No questions about religion"'} style={{width:"100%",minHeight:56,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"10px 13px",color:"#fff",fontSize:12,resize:"vertical",outline:"none",lineHeight:1.4}}/>
        <p style={{fontSize:9,color:"rgba(255,255,255,0.15)",marginTop:3}}>Exclude categories, focus on topics, skip keywords</p>
      </div>

      {/* Auto-speak toggle */}
      <div style={{width:"100%",marginBottom:22,display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:"10px 14px"}}>
        <div><span style={{fontSize:13}}>🔊</span><span style={{fontSize:12,color:"rgba(255,255,255,0.5)",fontWeight:600,marginLeft:8}}>Read questions aloud</span></div>
        <button className="bt" onClick={()=>setAutoSpeak(s=>!s)} style={{width:44,height:24,borderRadius:12,background:autoSpeak?"#3b82f6":"rgba(255,255,255,0.1)",padding:2,display:"flex",alignItems:"center"}}>
          <div style={{width:20,height:20,borderRadius:10,background:"#fff",transform:autoSpeak?"translateX(20px)":"translateX(0)",transition:"transform 0.2s"}}/>
        </button>
      </div>

      <button className="bt" onClick={startGame} disabled={!mode} style={{background:mode?"linear-gradient(135deg,#3b82f6,#7c3aed)":"rgba(255,255,255,0.05)",borderRadius:16,padding:"15px 44px",boxShadow:mode?"0 8px 32px rgba(59,130,246,0.3)":"none",display:"flex",alignItems:"center",gap:10,opacity:mode?1:0.4}}>
        <span style={{color:"#fff",fontSize:14,fontWeight:700,letterSpacing:3}}>START GAME</span><span style={{fontSize:16}}>→</span>
      </button>
    </div>)}

    {/* ══ GAME ══ */}
    {phase==="game"&&(<>
      {/* Scoreboard */}
      <div style={{width:"100%",maxWidth:520,marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",position:"relative"}}>
          {[0,1].map(i=>(<div key={i} className={flash===i?"sf":""} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,opacity:team===i?1:0.3,transition:"opacity .3s"}}>
            <span style={{color:"rgba(255,255,255,0.5)",fontSize:11,fontWeight:600}}>{i===0?"🔵 Éq.1":"🟠 Éq.2"}</span>
            <span style={{fontSize:30,fontWeight:900,color:TC[i]}}>{scores[i]}</span>
            <div style={{display:"flex",gap:3,alignItems:"center"}}>
              {jokers[i]&&<span style={{fontSize:8,color:"rgba(255,255,255,0.25)"}}>🃏</span>}
              {mode==="classic"&&<span style={{fontSize:8,color:"rgba(255,255,255,0.2)"}}>{wedges[i]?.length||0}/6</span>}
              {mode==="hybrid"&&team===i&&mult>1&&<span style={{fontSize:9,color:"#f59e0b"}}>{mult}x</span>}
            </div>
          </div>))}
          <div style={{position:"absolute",left:"50%",transform:"translateX(-50%)",textAlign:"center"}}>
            {sdOn?<div style={{color:"#ef4444",fontSize:12,fontWeight:800,letterSpacing:2}}>⚡ SD R{sdR}</div>
            :mode!=="classic"?<div style={{color:"rgba(255,255,255,0.35)",fontSize:11,fontWeight:600}}>{asked[0]+asked[1]}/{nQ*2}</div>
            :diceVal&&!picking&&!curQ?<div style={{fontSize:24}}>🎲 {diceVal}</div>:null}
          </div>
        </div>
        {mode!=="classic"&&!sdOn&&(<div style={{display:"flex",gap:3,marginTop:6}}>{[0,1].map(i=>(<div key={i} style={{flex:1,height:3,background:"rgba(255,255,255,0.05)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${(asked[i]/nQ)*100}%`,background:TC[i],borderRadius:3,transition:"width .4s"}}/></div>))}</div>)}
        {mode==="classic"&&(<div style={{width:"100%",maxWidth:520,marginTop:4}}>
          <GameBoard pos={boardPos[team]} wedges={wedges[team]||[]} reachable={picking?reachable:[]} onCellClick={classicCellClick} team={team}/>
        </div>)}
      </div>

      {/* Team + timer */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
        <div style={{background:TC[team],color:"#fff",fontWeight:700,fontSize:12,padding:"6px 20px",borderRadius:40,boxShadow:`0 0 18px ${TG[team]}`,letterSpacing:.5}}>
          {team===0?"🔵 Équipe 1":"🟠 Équipe 2"}
          {mode==="classic"&&streak>0&&!sdOn&&<span style={{marginLeft:5,fontSize:10}}>🔥{streak}</span>}
          {bonus&&<span style={{marginLeft:5,fontSize:10}}>✨BONUS</span>}
        </div>
        {curQ&&<TimerRing seconds={timer} max={TIMER_SEC}/>}
      </div>

      {/* Classic: dice rolling message */}
      {mode==="classic"&&picking&&!sdOn&&diceVal&&(
        <div className="ci" style={{width:"100%",maxWidth:520,marginBottom:10,textAlign:"center"}}>
          <div style={{fontSize:28,marginBottom:4}}>🎲 {diceVal}</div>
          <p style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>Pick a glowing cell on the board to move</p>
        </div>
      )}

      {/* Classic: hub pick by opponent */}
      {hubPick&&(<div className="ci" style={{width:"100%",maxWidth:520,marginBottom:14}}>
        <div style={{background:"rgba(245,158,11,0.06)",borderRadius:20,padding:18,border:"1px solid rgba(245,158,11,0.2)"}}>
          <div style={{textAlign:"center",marginBottom:12}}><div style={{fontSize:28,marginBottom:3}}>👑</div>
            <p style={{fontSize:14,fontWeight:700,color:"#f59e0b"}}>Final Challenge!</p>
            <p style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:3}}>{team===0?"Équipe 2":"Équipe 1"} picks the category:</p></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7}}>
            {CATS.slice(0,6).map(cat=>(<button key={cat} className="cb" onClick={()=>hubStart(cat)}><span style={{fontSize:18}}>{CAT_META[cat].icon}</span><span style={{fontSize:9}}>{cat.split(" ")[0]}</span></button>))}
          </div>
        </div>
      </div>)}

      {/* Question card */}
      {curQ&&!picking&&!hubPick&&(<div className={ca==="in"?"ci":ca==="out"?"co":""} style={{width:"100%",maxWidth:520}}>
        <div className={timeUp&&!revealed?"gd":""} style={{...S.glass,borderTop:`3px solid hsl(${CAT_META[curQ.c]?.hue||0},70%,55%)`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{display:"inline-flex",alignItems:"center",gap:5,background:"rgba(255,255,255,0.06)",padding:"4px 11px",borderRadius:20,fontSize:10,color:"rgba(255,255,255,0.5)",fontWeight:600}}>
              <span>{CAT_META[curQ.c]?.icon}</span><span>{curQ.c}</span>
              {isHQ&&mode==="classic"&&!sdOn&&<span style={{color:"#f59e0b",marginLeft:3}}>🏠HQ</span>}
              {hubQ&&<span style={{color:"#f59e0b",marginLeft:3}}>👑FINAL</span>}
              {bonus&&mode==="hybrid"&&<span style={{color:"#f59e0b",marginLeft:3}}>✨BONUS</span>}
            </div>
            {!revealed&&!timeUp&&!mcMode&&jokers[team]&&!sdOn&&(
              <button className="bt" onClick={useJoker} style={{background:"linear-gradient(135deg,#7c3aed,#a855f7)",borderRadius:10,padding:"4px 11px",color:"#fff",fontSize:10,fontWeight:700}}>🃏 Joker</button>)}
          </div>

          <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:20}}>
            <p style={{fontSize:cl(17,21),fontWeight:600,lineHeight:1.5,color:"#fff",flex:1}}>{curQ.q}</p>
            <button className="bt" onClick={()=>speak(curQ.q)} style={{background:"rgba(255,255,255,0.06)",borderRadius:10,padding:"6px 8px",color:"rgba(255,255,255,0.4)",fontSize:16,flexShrink:0,marginTop:2}} title="Read aloud">🔊</button>
          </div>

          {timeUp&&!revealed&&(<div className="shake" style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:12,padding:9,textAlign:"center",marginBottom:12}}><span style={{fontSize:14,fontWeight:700,color:"#ef4444"}}>⏰ Time's up!</span></div>)}

          {/* Joker QCM mode */}
          {mcMode&&!revealed&&!timeUp&&curQ.w&&(<div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
            {mcOptions.map((o,i)=>(<button key={i} className="mc" onClick={()=>{const ok=fuzzyMatch(o,curQ.a);setAnswerInput(o);setAnswerResult(ok?"correct":"wrong");setRevealed(true);stopT();}}><span style={{color:"rgba(255,255,255,0.3)",marginRight:7}}>{String.fromCharCode(65+i)}.</span>{o}</button>))}
          </div>)}

          {/* Text input answer zone */}
          {!revealed&&!timeUp&&!mcMode&&(<div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={{display:"flex",gap:8}}>
              <input ref={answerRef} type="text" value={answerInput} onChange={e=>setAnswerInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")submitAnswer();}}
                placeholder="Type your answer..."
                autoFocus
                style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:12,padding:"12px 14px",color:"#fff",fontSize:14,fontWeight:600,outline:"none"}}/>
              <button className="bt" onClick={submitAnswer} disabled={!answerInput.trim()} style={{background:answerInput.trim()?TC[team]:"rgba(255,255,255,0.06)",borderRadius:12,padding:"12px 18px",color:answerInput.trim()?"#fff":"rgba(255,255,255,0.2)",fontSize:13,fontWeight:700,whiteSpace:"nowrap"}}>Submit</button>
            </div>
            <button className="bt" onClick={reveal} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:8,color:"rgba(255,255,255,0.25)",fontSize:11,fontWeight:600}}>Skip — reveal answer</button>
          </div>)}

          {/* Revealed: show result + answer + override buttons */}
          {(revealed||timeUp)&&(<div style={{display:"flex",flexDirection:"column",gap:12}}>
            {/* Fuzzy match result banner */}
            {answerResult&&(<div style={{background:answerResult==="correct"?"rgba(16,185,129,0.12)":"rgba(239,68,68,0.12)",border:`1px solid ${answerResult==="correct"?"rgba(16,185,129,0.3)":"rgba(239,68,68,0.3)"}`,borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>{answerResult==="correct"?"✅":"❌"}</span>
              <div><div style={{fontSize:12,fontWeight:700,color:answerResult==="correct"?"#10b981":"#ef4444"}}>{answerResult==="correct"?"Match!":"Not quite..."}</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2}}>Your answer: <span style={{color:"rgba(255,255,255,0.7)",fontWeight:600}}>{answerInput}</span></div></div>
            </div>)}
            <div style={{background:"rgba(16,185,129,0.07)",border:"1px solid rgba(16,185,129,0.2)",borderRadius:16,padding:14,textAlign:"center"}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:3,color:"#10b981",marginBottom:4}}>ANSWER</div>
              <div style={{fontSize:cl(16,20),fontWeight:800}}>{curQ.a}</div>
            </div>
            {/* Auto-validated: show result + override */}
            {answerResult?(<div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button className="bt" onClick={()=>handleAns(answerResult==="correct")} style={{width:"100%",background:answerResult==="correct"?"linear-gradient(135deg,#059669,#10b981)":"linear-gradient(135deg,#dc2626,#ef4444)",borderRadius:14,padding:13,color:"#fff",fontSize:14,fontWeight:700}}>{answerResult==="correct"?"✅ Continue — Correct!":"❌ Continue — Wrong"}</button>
              <button className="bt" onClick={()=>handleAns(answerResult!=="correct")} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:8,color:"rgba(255,255,255,0.3)",fontSize:11,fontWeight:600}}>{answerResult==="correct"?"Override: mark as wrong":"Override: accept as correct"}</button>
            </div>)
            :(<div style={{display:"flex",gap:8}}>
              <button className="bt" onClick={()=>handleAns(true)} style={{flex:1,background:"linear-gradient(135deg,#059669,#10b981)",borderRadius:14,padding:12,color:"#fff",fontSize:13,fontWeight:700}}>✅ Correct</button>
              <button className="bt" onClick={()=>handleAns(false)} style={{flex:1,background:"linear-gradient(135deg,#dc2626,#ef4444)",borderRadius:14,padding:12,color:"#fff",fontSize:13,fontWeight:700}}>❌ Wrong</button>
            </div>)}
          </div>)}

          {timeUp&&!revealed&&(<button className="bt" onClick={reveal} style={{width:"100%",background:"rgba(255,255,255,0.06)",borderRadius:14,padding:12,color:"rgba(255,255,255,0.4)",fontSize:12,fontWeight:600,marginTop:6}}>Show answer</button>)}
        </div>
      </div>)}
    </>)}

    {/* ══ END ══ */}
    {phase==="end"&&(<>
      <Confetti active={true}/>
      <div className="ci" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flex:1,textAlign:"center",maxWidth:460,width:"100%",zIndex:10}}>
        <div style={{fontSize:60,marginBottom:8}}>{scores[0]!==scores[1]?"🏆":"🤝"}</div>
        <h1 style={{fontSize:cl(24,30),fontWeight:800,marginBottom:24,lineHeight:1.3}}>
          {scores[0]>scores[1]?"Équipe 1 wins!":scores[1]>scores[0]?"Équipe 2 wins!":"It's a tie!"}</h1>
        <div style={{display:"flex",gap:18,marginBottom:24,flexWrap:"wrap",justifyContent:"center"}}>
          {[0,1].map(i=>{const w=scores[i]>scores[1-i];return(
            <div key={i} style={{background:"rgba(255,255,255,0.04)",border:w?`2px solid ${TC[i]}`:"1px solid rgba(255,255,255,0.08)",borderRadius:20,padding:"20px 30px",transform:w?"scale(1.05)":"scale(1)"}}>
              <div style={{color:"rgba(255,255,255,0.5)",fontSize:12,fontWeight:600,marginBottom:6}}>{i===0?"🔵 Équipe 1":"🟠 Équipe 2"}</div>
              <div style={{fontSize:44,fontWeight:900,color:"#fff",lineHeight:1}}>{scores[i]}</div>
              <div style={{color:"rgba(255,255,255,0.2)",fontSize:13,marginTop:3}}>pts</div>
              {mode==="classic"&&<div style={{marginTop:6,fontSize:10,color:"rgba(255,255,255,0.25)"}}>{wedges[i]?.length||0}/6 wedges</div>}
            </div>);})}
        </div>
        {mode!=="classic"&&(<div style={{marginBottom:18,display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>
          <p style={{width:"100%",fontSize:11,color:"rgba(255,255,255,0.25)",marginBottom:3}}>Want more?</p>
          {[5,10].map(n=>(<button key={n} className="bt" onClick={()=>extendGame(n)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"8px 18px",color:"rgba(255,255,255,0.4)",fontSize:12,fontWeight:600}}>+{n} questions</button>))}
        </div>)}
        <button className="bt" onClick={goHome} style={{background:"linear-gradient(135deg,#3b82f6,#7c3aed)",borderRadius:14,padding:"13px 30px",color:"#fff",fontSize:14,fontWeight:700,boxShadow:"0 6px 24px rgba(59,130,246,0.3)"}}>🔄 New Game</button>
      </div>
    </>)}

    </div>
  </>);
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
